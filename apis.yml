aid: thrivent-financial-for-lutherans
name: Thrivent Financial
description: >-
  Thrivent Financial is a not-for-profit, membership-owned Fortune 500 financial
  services organization headquartered in Minneapolis, Minnesota, that helps Christians
  be wise with money and live generously. With more than $212 billion in assets under
  management and advisement, over 4,500 employees, and 2.4 million members and clients,
  Thrivent provides comprehensive financial advice, insurance, investments, banking,
  and generosity programs. The organization is distinguished by connecting financial
  planning with charitable giving, community impact, and values-based decision making.
